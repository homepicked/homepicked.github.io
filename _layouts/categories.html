---
layout: default
---

<div class="section-inner">
  <h1>{{ page.title }}</h1>
  {% for category in site.categories %}
  <section id="{{ category[0] }}">
    <h2>{{ category[0] }}</h2>
    <ul>
      {% for post in category[1] %}
      <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <time>{{ post.date | date: '%d.%m.%Y' }}</time>
      </li>
      {% endfor %}
    </ul>
  </section>
  {% endfor %}
</div>
